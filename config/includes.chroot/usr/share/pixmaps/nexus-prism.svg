<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="prismGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3366"/>
      <stop offset="25%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#ffd93d"/>
      <stop offset="75%" style="stop-color:#6bcb77"/>
      <stop offset="100%" style="stop-color:#4d96ff"/>
    </linearGradient>
    
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4d96ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#4d96ff;stop-opacity:0"/>
    </radialGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bgGrad)"/>
  
  <!-- Glow effect -->
  <circle cx="128" cy="128" r="80" fill="url(#glow)"/>
  
  <!-- Main hexagon -->
  <g transform="translate(128, 128)" filter="url(#shadow)">
    <!-- Outer hexagon -->
    <polygon points="0,-72 62,-36 62,36 0,72 -62,36 -62,-36" 
             fill="none" stroke="url(#prismGrad)" stroke-width="4"/>
    
    <!-- Middle hexagon -->
    <polygon points="0,-54 47,-27 47,27 0,54 -47,27 -47,-27" 
             fill="none" stroke="url(#prismGrad)" stroke-width="2" opacity="0.7"/>
    
    <!-- Inner hexagon -->
    <polygon points="0,-36 31,-18 31,18 0,36 -31,18 -31,-18" 
             fill="url(#prismGrad)" opacity="0.9"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="8" fill="#ffffff"/>
  </g>
  
  <!-- Connection lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.4">
    <line x1="128" y1="30" x2="128" y2="10"/>
    <line x1="128" y1="226" x2="128" y2="246"/>
    <line x1="30" y1="128" x2="10" y2="128"/>
    <line x1="226" y1="128" x2="246" y2="128"/>
  </g>
  
  <!-- Corner accents -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="30" cy="30" r="4"/>
    <circle cx="226" cy="30" r="4"/>
    <circle cx="30" cy="226" r="4"/>
    <circle cx="226" cy="226" r="4"/>
  </g>
</svg>