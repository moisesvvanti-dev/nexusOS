name: Build NexusOS Kali ISO

on:
  push:
    branches: [main, master, kali-base]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      variant:
        description: 'ISO Variant'
        required: false
        default: 'nexus-kali-full'
      arch:
        description: 'Architecture'
        required: false
        default: 'amd64'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive
  MAKEFLAGS: '-j$(nproc)'
  TZ: UTC

jobs:
  validate:
    name: Validate Sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check shell scripts syntax
        run: |
          echo "=== Validating shell scripts ==="
          for script in $(find . -name "*.sh" -type f); do
            echo "Checking: $script"
            if ! bash -n "$script" 2>&1; then
              echo "Syntax error in $script"
              exit 1
            fi
          done
          echo "All shell scripts valid"

      - name: Check required files exist
        run: |
          echo "=== Checking required files ==="
          REQUIRED_FILES=(
            "config/package-lists/nexusos.list.chroot"
            "build.sh"
          )
          for f in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              exit 1
            fi
            echo "OK: $f"
          done

  build-full:
    name: Build NexusOS ISO
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up environment
        run: |
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          mkdir -p build out logs

      - name: Install dependencies
        run: |
          echo "=== Installing build dependencies ==="
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            parted \
            fdisk \
            dosfstools \
            curl \
            wget \
            gnupg \
            python3 \
            python3-pip \
            git \
            || true

      - name: Setup Kali repositories
        run: |
          echo "=== Configuring Kali repositories ==="
          if [ ! -f /usr/share/keyrings/kali-archive-keyring.gpg ]; then
            curl -fsSL https://archive.kali.org/archive-key.asc | gpg --dearmor -o /tmp/kali-archive-keyring.gpg
            sudo mv /tmp/kali-archive-keyring.gpg /usr/share/keyrings/kali-archive-keyring.gpg
          fi
          echo "deb [signed-by=/usr/share/keyrings/kali-archive-keyring.gpg] http://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware" | \
            sudo tee /etc/apt/sources.list.d/kali-rolling.list > /dev/null
          sudo apt-get update -qq 2>&1 | grep -v "^Get:" || true

      - name: Create NexusOS build script
        run: |
          cat > build.sh << 'ENDSCRIPT'
#!/bin/bash
###############################################################################
# NexusOS Build Script - Kali Linux Based
###############################################################################

set -euo pipefail

SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
PROJECT_ROOT="$SCRIPT_DIR"
BUILD_DIR="$PROJECT_ROOT/build"
OUT_DIR="$PROJECT_ROOT/out"
LOG_DIR="$PROJECT_ROOT/logs"

NEXUS_VERSION="12.0.0"
NEXUS_CODENAME="Aurora"
KALI_VERSION="kali-rolling"
BUILD_DATE=$(date +%Y%m%d-%H%M%S)
ARCH="${ARCH:-amd64}"

RED='\033[0;31m'
GREEN='\033[0;32m'
YELLOW='\033[1;33m'
BLUE='\033[0;34m'
CYAN='\033[0;36m'
NC='\033[0m'

log() { echo -e "${BLUE}[$(date '+%Y-%m-%d %H:%M:%S')]${NC} $1"; }
log_success() { echo -e "${GREEN}[OK]${NC} $1"; }
log_warning() { echo -e "${YELLOW}[W]${NC} $1"; }
log_error() { echo -e "${RED}[X]${NC} $1"; }
log_section() { echo ""; echo -e "${CYAN}=== $1 ===${NC}"; }

die() { log_error "$1"; exit 1; }

check_deps() {
    log "Checking dependencies..."
    local deps=(debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin mtools parted fdisk dosfstools)
    for d in "${deps[@]}"; do
        if ! dpkg -l | grep -q "^ii  $d "; then
            log_warning "Missing: $d"
            sudo apt-get install -y -qq "$d" 2>/dev/null || true
        fi
    done
    log_success "Dependencies OK"
}

setup_kali_repos() {
    log_section "Setting up Kali repos"
    if [ ! -f /usr/share/keyrings/kali-archive-keyring.gpg ]; then
        wget -q -O - https://archive.kali.org/archive-key.asc | gpg --dearmor -o /tmp/kali-archive-keyring.gpg
        sudo mv /tmp/kali-archive-keyring.gpg /usr/share/keyrings/kali-archive-keyring.gpg
    fi
    echo "deb [signed-by=/usr/share/keyrings/kali-archive-keyring.gpg] http://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware" | \
        sudo tee /etc/apt/sources.list.d/kali-rolling.list > /dev/null
    sudo apt-get update -qq 2>&1 | grep -v "^Get:" || true
}

prepare_dirs() {
    log_section "Preparing directories"
    mkdir -p "$BUILD_DIR/rootfs" "$BUILD_DIR/image" "$OUT_DIR" "$LOG_DIR"
    log_success "Directories ready"
}

install_kali_base() {
    log_section "Installing Kali base"
    log "Running debootstrap..."
    sudo debootstrap --arch "$ARCH" \
        --components "main,contrib,non-free,non-free-firmware" \
        "$KALI_VERSION" \
        "$BUILD_DIR/rootfs" \
        http://http.kali.org/kali 2>&1 | tee "$LOG_DIR/debootstrap.log"
    log_success "Kali base installed"
}

configure_base() {
    log_section "Configuring base system"
    sudo cp /etc/apt/sources.list "$BUILD_DIR/rootfs/etc/apt/sources.list" 2>/dev/null || true
    sudo chroot "$BUILD_DIR/rootfs" bash -c "apt-get update -qq 2>&1 | grep -v '^Get:'" || true
    
    log "Installing kernel..."
    sudo chroot "$BUILD_DIR/rootfs" bash -c "apt-get install -y -qq \
        linux-image-amd64 \
        linux-headers-amd64 \
        firmware-linux \
        firmware-misc-nonfree \
        2>&1 | tail -3" || true
    
    log "Installing network stack..."
    sudo chroot "$BUILD_DIR/rootfs" bash -c "apt-get install -y -qq \
        systemd \
        network-manager \
        network-manager-gnome \
        bluez \
        blueman \
        modemmanager \
        iproute2 \
        iputils-ping \
        wpasupplicant \
        wireless-tools \
        rfkill \
        2>&1 | tail -3" || true
    
    log_success "Base configured"
}

install_desktop() {
    log_section "Installing desktop"
    sudo chroot "$BUILD_DIR/rootfs" bash -c "apt-get install -y -qq \
        xfce4 \
        xfce4-goodies \
        lightdm \
        lightdm-gtk-greeter \
        papirus-icon-theme \
        arc-theme \
        fonts-noto \
        2>&1 | tail -5" || true
    log_success "Desktop installed"
}

install_nexus_packages() {
    log_section "Installing Nexus packages"
    sudo chroot "$BUILD_DIR/rootfs" bash -c "apt-get install -y -qq \
        git vim nano htop btop neofetch \
        python3 python3-pip \
        curl wget unzip zip p7zip-full \
        nmap tcpdump netcat-openbsd socat \
        wine winetricks \
        2>&1 | tail -5" || true
    log_success "Packages installed"
}

install_kernel_tweaks() {
    log_section "Applying kernel tweaks"
    cat << 'SYSCTL' | sudo tee "$BUILD_DIR/rootfs/etc/sysctl.d/99-nexus.conf" > /dev/null
net.core.rmem_max=16777216
net.core.wmem_max=16777216
net.ipv4.tcp_window_scaling=1
net.ipv4.tcp_congestion_control=htcp
vm.swappiness=10
vm.vfs_cache_pressure=50
SYSCTL
    log_success "Kernel tuned"
}

install_nexus_scripts() {
    log_section "Installing Nexus scripts"
    sudo mkdir -p "$BUILD_DIR/rootfs/usr/local/bin"
    
    # Create tethering detector
    cat << 'TETHERDETECT' | sudo tee "$BUILD_DIR/rootfs/usr/local/bin/nexus-tethering-detect" > /dev/null
#!/bin/bash
###############################################################################
# NexusOS Advanced Tethering Detection
###############################################################################
set -euo pipefail

LOG="/var/log/nexus-tethering.log"
mkdir -p "$(dirname "$LOG")"

RED='\033[0;31m'
GREEN='\033[0;32m'
YELLOW='\033[1;33m'
BLUE='\033[0;34m'
NC='\033[0m'

log() { echo -e "${BLUE}[$(date '+%H:%M:%S')]${NC} $1" | tee -a "$LOG"; }
log_success() { echo -e "${GREEN}[OK]${NC} $1" | tee -a "$LOG"; }
log_warning() { echo -e "${YELLOW}[W]${NC} $1" | tee -a "$LOG"; }

echo "========================================" > "$LOG"
echo "NexusOS Tethering Detection v2.0" >> "$LOG"
echo "========================================" >> "$LOG"
echo "" >> "$LOG"

# USB Tethering Detection
log "=== USB Tethering ==="
USB_NIC=$(ip -o link show | grep -i "usb" | awk -F': ' '{print $2}' || true)
RNDIS_DEV=$(dmesg | grep -i "rndis\|cdc_ether" | tail -1 || true)

if [ -n "$USB_NIC" ]; then
    log_success "USB interface found: $USB_NIC"
    echo "USB_TETHER=active" 
else
    log "No USB tethering detected"
    echo "USB_TETHER=inactive"
fi

if [ -n "$RNDIS_DEV" ]; then
    log_success "RNDIS device: $RNDIS_DEV"
fi

# Bluetooth Tethering Detection
log "=== Bluetooth Tethering ==="
if command -v bluetoothctl &>/dev/null; then
    if bluetoothctl power on 2>/dev/null; then
        PAIRED_BT=$(bluetoothctl paired-devices 2>/dev/null | wc -l)
        log "Paired Bluetooth devices: $PAIRED_BT"
        BNEP_IFACE=$(ls /sys/class/net/ 2>/dev/null | grep bnep || true)
        if [ -n "$BNEP_IFACE" ]; then
            log_success "BNEP interface active: $BNEP_IFACE"
            echo "BT_TETHER=active"
        else
            log "No active BNEP interface"
            echo "BT_TETHER=inactive"
        fi
    else
        log_warning "Bluetooth not available"
        echo "BT_TETHER=inactive"
    fi
else
    log_warning "bluetoothctl not found"
    echo "BT_TETHER=inactive"
fi

# Mobile Broadband Detection
log "=== Mobile Broadband ==="
if command -v mmcli &>/dev/null; then
    MODEMS=$(mmcli -L 2>/dev/null | grep -c Modem || echo 0)
    if [ "$MODEMS" -gt 0 ]; then
        log_success "Modem(s) found: $MODEMS"
        echo "MOBILE_BB=active"
    else
        log "No modems detected"
        echo "MOBILE_BB=inactive"
    fi
else
    log_warning "ModemManager not available"
    echo "MOBILE_BB=inactive"
fi

# WiFi Direct Detection
log "=== WiFi Direct ==="
WIFI_ADHOC=$(iw dev 2>/dev/null | grep -A5 "type adhoc" | head -5 || true)
if [ -n "$WIFI_ADHOC" ]; then
    log_success "WiFi ad-hoc detected"
    echo "WIFI_DIRECT=active"
else
    log "No WiFi direct/adhoc"
    echo "WIFI_DIRECT=inactive"
fi

echo "" >> "$LOG"
log "Detection complete"
TETHERDETECT
sudo chmod +x "$BUILD_DIR/rootfs/usr/local/bin/nexus-tethering-detect"

    # Network monitor
    cat << 'NETMON' | sudo tee "$BUILD_DIR/rootfs/usr/local/bin/nexus-network-monitor" > /dev/null
#!/bin/bash
###############################################################################
# NexusOS Network Monitor
###############################################################################
set -euo pipefail

STATE_DIR="/run/nexus/network"
mkdir -p "$STATE_DIR"

get_primary_iface() {
    ip route show default 2>/dev/null | awk '/default/ {print $5}' | head -1
}

get_iface_type() {
    local iface="$1"
    case "$iface" in
        usb*) echo "usb-tethering" ;;
        bnep*) echo "bluetooth-pan" ;;
        wlan*|wlp*) echo "wifi" ;;
        eth*|en*) echo "ethernet" ;;
        wwan*) echo "mobile-broadband" ;;
        tun*|tap*) echo "vpn" ;;
        *) echo "unknown" ;;
    esac
}

check_connectivity() {
    ping -c 1 -W 2 8.8.8.8 &>/dev/null && echo "online" || echo "offline"
}

echo "=== NexusOS Network Status ==="
echo "Primary Interface: $(get_primary_iface)"
echo "Type: $(get_iface_type $(get_primary_iface))"
echo "Connectivity: $(check_connectivity)"
echo ""
echo "=== All Interfaces ==="
ip -o link show | awk -F': ' '{print $2, $(NF-2)}'
echo ""
echo "=== Active Connections ==="
nmcli -t -f DEVICE,TYPE,STATE device 2>/dev/null | grep connected || echo "None"
NETMON
sudo chmod +x "$BUILD_DIR/rootfs/usr/local/bin/nexus-network-monitor"

    # Nexus profile
    cat << 'PROFILE' | sudo tee "$BUILD_DIR/rootfs/etc/profile.d/nexusos.sh" > /dev/null
export NEXUSOS_VERSION="Aurora"
export NEXUSOS_BUILD="$BUILD_DATE"
alias cls='clear'
alias dir='ls -la'
alias ipconfig='ip addr'
alias tasklist='ps aux'
alias netmon='nexus-network-monitor --status'
alias tether='sudo nexus-tethering-detect'
PROFILE

    log_success "Scripts installed"
}

configure_display_manager() {
    log_section "Configuring LightDM"
    sudo mkdir -p "$BUILD_DIR/rootfs/etc/lightdm"
    cat << 'LIGHTDM' | sudo tee "$BUILD_DIR/rootfs/etc/lightdm/lightdm-gtk-greeter.conf" > /dev/null
[greeter]
theme-name=Arc-Dark
icon-theme-name=Papirus-Dark
font-name=Noto Sans 10
indicators=~host;~spacer;~clock;~spacer;~language;~session;~power
clock-format=%H:%M  •  %A, %d/%m/%Y
LIGHTDM
    log_success "LightDM configured"
}

configure_network_services() {
    log_section "Configuring network services"
    sudo chroot "$BUILD_DIR/rootfs" bash -c "systemctl enable NetworkManager 2>/dev/null || true"
    sudo chroot "$BUILD_DIR/rootfs" bash -c "systemctl enable bluetooth 2>/dev/null || true"
    
    sudo mkdir -p "$BUILD_DIR/rootfs/etc/NetworkManager/dispatcher.d"
    cat << 'NMDI' | sudo tee "$BUILD_DIR/rootfs/etc/NetworkManager/dispatcher.d/99-nexus-tethering" > /dev/null
#!/bin/bash
case "$2" in
    up) /usr/local/bin/nexus-tethering-detect &>/dev/null & ;;
esac
NMDI
    sudo chmod +x "$BUILD_DIR/rootfs/etc/NetworkManager/dispatcher.d/99-nexus-tethering"
    log_success "Network services configured"
}

configure_os_identity() {
    log_section "Setting OS identity"
    cat << 'OSREL' | sudo tee "$BUILD_DIR/rootfs/etc/os-release" > /dev/null
NAME="NexusOS"
VERSION="12.0.0 (Aurora)"
ID=nexusos
ID_LIKE=kali
VERSION_ID="12.0.0"
PRETTY_NAME="NexusOS Aurora"
ANSI_COLOR="1;36"
URL="https://nexusos.project"
VERSION_CODENAME=Aurora
OSREL
    log_success "OS identity set"
}

apply_theme() {
    log_section "Applying NexusOS theme"
    sudo mkdir -p "$BUILD_DIR/rootfs/usr/share/backgrounds/nexusos"
    sudo mkdir -p "$BUILD_DIR/rootfs/etc/skel/.config/xfce4/xfconf/xfce-perchannel-xml"
    
    cat << 'XFWM4' | sudo tee "$BUILD_DIR/rootfs/etc/skel/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml" > /dev/null
<?xml version="1.0" encoding="UTF-8"?>
<channel name="xfwm4" version="1.0">
  <property name="general" type="empty">
    <property name="theme" type="string" value="Arc-Dark"/>
    <property name="title_font" type="string" value="Noto Sans SemiBold 10"/>
    <property name="button_layout" type="string" value="O|HMC"/>
    <property name="use_compositing" type="bool" value="true"/>
    <property name="frame_opacity" type="int" value="95"/>
    <property name="inactive_opacity" type="int" value="90"/>
  </property>
</channel>
XFWM4
    log_success "Theme applied"
}

cleanup() {
    log_section "Cleaning up"
    sudo chroot "$BUILD_DIR/rootfs" bash -c "apt-get clean && apt-get autoclean"
    sudo rm -rf "$BUILD_DIR/rootfs/var/log/"* 2>/dev/null || true
    log_success "Cleanup complete"
}

create_image() {
    log_section "Creating filesystem image"
    sudo mksquashfs "$BUILD_DIR/rootfs" "$BUILD_DIR/image/squashfs" -comp xz 2>&1 | tail -5
    log_success "SquashFS created"
}

create_boot() {
    log_section "Creating boot image"
    mkdir -p "$BUILD_DIR/image/boot"
    if [ -d "$BUILD_DIR/rootfs/boot" ]; then
        sudo cp "$BUILD_DIR/rootfs/boot/"* "$BUILD_DIR/image/boot/" 2>/dev/null || true
    fi
    log_success "Boot image created"
}

create_iso() {
    log_section "Creating ISO"
    ISO_NAME="NexusOS-${NEXUS_VERSION}-${NEXUS_CODENAME}-${ARCH}-${BUILD_DATE}.iso"
    ISO_PATH="$OUT_DIR/$ISO_NAME"
    
    if [ -d /usr/lib/ISOLINUX ]; then
        sudo xorriso -as mkisofs \
            -r -J -joliet-long \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -partition_offset 16 \
            -V "NexusOS" \
            -o "$ISO_PATH" \
            "$BUILD_DIR/image" 2>&1 | tail -10
    else
        sudo xorriso -as mkisofs \
            -r -J \
            -V "NexusOS" \
            -o "$ISO_PATH" \
            "$BUILD_DIR/image" 2>&1 | tail -10
    fi
    
    if [ -f "$ISO_PATH" ]; then
        log_success "ISO created: $ISO_NAME"
        echo "Size: $(du -h "$ISO_PATH" | cut -f1)"
        cd "$OUT_DIR"
        sha256sum "$ISO_NAME" > "${ISO_NAME}.sha256"
    else
        die "ISO creation failed"
    fi
}

main() {
    log_section "NEXUSOS KALI BUILD"
    check_deps
    setup_kali_repos
    prepare_dirs
    install_kali_base
    configure_base
    install_desktop
    install_nexus_packages
    install_kernel_tweaks
    install_nexus_scripts
    configure_display_manager
    configure_network_services
    configure_os_identity
    apply_theme
    cleanup
    create_image
    create_boot
    create_iso
    log_section "BUILD COMPLETE"
    ls -lh "$OUT_DIR"/*.iso 2>/dev/null || ls -lh "$OUT_DIR/"
}

main "$@"
ENDSCRIPT
chmod +x build.sh

      - name: Run build
        run: |
          echo "=== Running NexusOS build ==="
          chmod +x build.sh
          ./build.sh 2>&1 | tee logs/build-full.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexus-build-logs
          path: logs/
          retention-days: 7
          ignore-no-files: true

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: NexusOS-ISO
          path: |
            out/*.iso
            out/*.sha256
          retention-days: 14
          ignore-no-files: true

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-full
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: NexusOS-ISO
          path: out/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.iso out/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}