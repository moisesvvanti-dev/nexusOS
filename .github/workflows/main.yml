name: Build NexusOS Kali ISO

on:
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive
  TZ: UTC

jobs:
  validate:
    name: Validate Sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check shell scripts syntax
        run: |
          for script in $(find . -name "*.sh" -type f); do
            bash -n "$script" || { echo "Syntax error in $script"; exit 1; }
          done
          echo "All shell scripts valid"

      - name: Check required files exist
        run: |
          REQUIRED_FILES=("build.sh" "config/package-lists/nexusos.list.chroot")
          for f in "${REQUIRED_FILES[@]}"; do
            [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
          done
          echo "Required files OK"

  build:
    name: Build NexusOS ISO
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup environment
        run: |
          mkdir -p build out logs

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin mtools parted fdisk dosfstools \
            curl wget gnupg python3 python3-pip git || true

      - name: Setup Kali repositories
        run: |
          if [ ! -f /usr/share/keyrings/kali-archive-keyring.gpg ]; then
            curl -fsSL https://archive.kali.org/archive-key.asc | gpg --dearmor -o /tmp/kali-archive-keyring.gpg
            sudo mv /tmp/kali-archive-keyring.gpg /usr/share/keyrings/kali-archive-keyring.gpg
          fi
          echo "deb [signed-by=/usr/share/keyrings/kali-archive-keyring.gpg] http://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware" | \
            sudo tee /etc/apt/sources.list.d/kali-rolling.list > /dev/null
          sudo apt-get update -qq 2>&1 | grep -v "^Get:" || true

      - name: Run build
        run: |
          chmod +x build.sh
          ./build.sh 2>&1 | tee logs/build.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nexus-build-logs
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload ISO
        uses: actions/upload-artifact@v6
        with:
          name: NexusOS-ISO
          path: |
            out/*.iso
            out/*.sha256
          retention-days: 14
          if-no-files-found: ignore

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download ISO
        uses: actions/download-artifact@v6
        with:
          name: NexusOS-ISO
          path: out/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.iso out/*.sha256
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}